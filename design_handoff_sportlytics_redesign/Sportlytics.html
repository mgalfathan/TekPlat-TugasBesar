<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sportlytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#0b0c08; --panel:#13140e; --panel-2:#191b11; --elev:#1d1f14;
  --border:rgba(255,255,255,.07); --border-2:rgba(255,255,255,.13);
  --ink:#f4f5ec; --muted:#8d8f7e; --muted-2:#5f6052;
  --lime:#c8f23a; --lime-ink:#0b0c08;
  --w:#74e6a4; --d:#9ea08e; --l:#f5837f;
  --maxw:1240px;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);
  font-family:'Archivo',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
body{background-image:radial-gradient(120% 80% at 80% -10%, rgba(200,242,58,.05), transparent 60%);}
::selection{background:var(--lime);color:var(--lime-ink);}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
.muted-x{color:var(--muted-2);font-size:12px}

/* ---------- NAV ---------- */
.nav{position:sticky;top:0;z-index:40;background:rgba(11,12,8,.86);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);}
.nav-inner{max-width:var(--maxw);margin:0 auto;height:64px;display:flex;align-items:center;gap:24px;padding:0 28px;}
.brand{font-family:'Anton',sans-serif;font-size:24px;letter-spacing:.5px;text-transform:uppercase;
  display:flex;align-items:center;gap:0;white-space:nowrap;}
.brand .b-dot{color:var(--lime);}
.nav-tabs{display:flex;align-items:center;gap:2px;margin-left:8px;flex:1;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{display:flex;align-items:center;gap:7px;padding:8px 13px;border-radius:7px;
  font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:500;letter-spacing:.06em;
  text-transform:uppercase;color:var(--muted);white-space:nowrap;transition:.15s;}
.nav-tab .nt-n{color:var(--muted-2);font-weight:700;}
.nav-tab:hover{color:var(--ink);background:rgba(255,255,255,.04);}
.nav-tab.on{background:var(--lime);color:var(--lime-ink);}
.nav-tab.on .nt-n{color:var(--lime-ink);opacity:.55;}
.nav-auth{display:flex;align-items:center;gap:10px;}
.nav-user{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
.nav-user b{color:var(--ink);font-weight:500;}
.role-tag{margin-left:6px;background:rgba(200,242,58,.16);color:var(--lime);padding:2px 6px;border-radius:4px;
  font-size:9.5px;font-weight:700;letter-spacing:.05em;}
.nav-logout{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted-2);
  border:1px solid var(--border);padding:7px 11px;border-radius:7px;transition:.15s;}
.nav-logout:hover{color:var(--ink);border-color:var(--border-2);}

/* ---------- LAYOUT ---------- */
.wrap{max-width:var(--maxw);margin:0 auto;padding:38px 28px 90px;}
.screen{animation:fade .4s ease both;}
@keyframes fade{from{transform:translateY(7px)}to{transform:none}}
@media (prefers-reduced-motion: reduce){.screen{animation:none;}}
.screen-head{margin-bottom:34px;}
.head-row{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;}
.eyebrow{display:flex;align-items:center;gap:9px;font-family:'JetBrains Mono',monospace;font-size:12px;
  font-weight:700;letter-spacing:.14em;color:var(--lime);text-transform:uppercase;margin-bottom:14px;}
.eyebrow-n{background:var(--lime);color:var(--lime-ink);padding:1px 7px;border-radius:4px;}
.display{font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;
  font-size:clamp(40px,6.4vw,82px);line-height:.9;letter-spacing:.5px;margin:0 0 18px;color:var(--ink);}
.lede{color:var(--muted);font-size:16px;line-height:1.55;max-width:620px;margin:0;text-wrap:pretty;}

/* ---------- PANELS ---------- */
.panel{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:22px;}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.panel-title{font-size:16px;font-weight:800;letter-spacing:-.01em;margin:0;}
.panel-link{font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:600;letter-spacing:.08em;
  color:var(--muted);cursor:pointer;transition:.15s;}
.panel-link:hover{color:var(--lime);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;}
@media(max-width:880px){.grid-2{grid-template-columns:1fr}}

/* ---------- STAT CARDS ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:30px;}
@media(max-width:680px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden;}
.stat-card::after{content:"";position:absolute;left:0;bottom:0;height:3px;width:100%;
  background:linear-gradient(90deg,var(--lime),transparent);opacity:.7;}
.stat-value{font-family:'Anton',sans-serif;font-size:46px;line-height:1;letter-spacing:.5px;}
.stat-label{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-top:8px;}

/* ---------- CREST / FORM ---------- */
.crest{border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none;}
.crest span{font-family:'Anton',sans-serif;letter-spacing:.5px;}
.form-dots{display:flex;gap:4px;}
.fd{width:21px;height:21px;border-radius:6px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;}
.fd-W{background:rgba(116,230,164,.16);color:var(--w);}
.fd-D{background:rgba(158,160,142,.16);color:var(--d);}
.fd-L{background:rgba(245,131,127,.16);color:var(--l);}

/* ---------- RESULTS ---------- */
.result-list{display:flex;flex-direction:column;}
.result-row{display:grid;grid-template-columns:1fr auto 1fr auto;align-items:center;gap:12px;
  padding:11px 0;border-bottom:1px solid var(--border);}
.result-row:last-child{border-bottom:none;}
.result-side{display:flex;align-items:center;gap:9px;min-width:0;}
.result-away{justify-content:flex-end;}
.rs-name{font-size:13.5px;font-weight:600;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rs-win{color:var(--ink);}
.result-score{font-family:'Anton',sans-serif;font-size:22px;display:flex;align-items:center;gap:7px;}
.result-score span{color:var(--muted-2);font-size:15px;}
.result-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted-2);min-width:46px;text-align:right;}

/* ---------- RANK BARS ---------- */
.rankbars{display:flex;flex-direction:column;gap:11px;}
.rankbar-row{display:grid;grid-template-columns:18px 42px 1fr 34px;align-items:center;gap:11px;}
.rankbar-rank{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted-2);}
.rankbar-name{font-family:'Anton',sans-serif;font-size:14px;letter-spacing:.5px;}
.rankbar-track{height:9px;background:rgba(255,255,255,.05);border-radius:5px;overflow:hidden;}
.rankbar-fill{height:100%;border-radius:5px;transition:width .5s cubic-bezier(.2,.7,.2,1);}
.rankbar-val{font-family:'Anton',sans-serif;font-size:16px;text-align:right;}
.leader-callout{display:flex;align-items:center;gap:14px;margin-top:20px;padding-top:18px;border-top:1px solid var(--border);}
.lc-label{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.12em;color:var(--muted);}
.lc-name{font-weight:800;font-size:16px;margin-top:2px;}
.lc-points{margin-left:auto;font-family:'Anton',sans-serif;font-size:36px;line-height:1;display:flex;align-items:baseline;gap:5px;}
.lc-points span{font-size:12px;color:var(--muted);}

/* ---------- FIXTURES ---------- */
.fixture-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:760px){.fixture-grid{grid-template-columns:repeat(2,1fr)}}
.fixture-card{background:var(--panel-2);border:1px solid var(--border);border-radius:12px;padding:16px;}
.fx-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.05em;margin-bottom:14px;}
.fx-teams{display:flex;align-items:center;justify-content:space-between;}
.fx-team{display:flex;flex-direction:column;align-items:center;gap:7px;font-family:'Anton',sans-serif;font-size:13px;letter-spacing:.5px;}
.fx-v{font-family:'Anton',sans-serif;color:var(--muted-2);font-size:14px;}

/* ---------- TOOLBAR ---------- */
.toolbar{display:flex;flex-wrap:wrap;gap:20px;align-items:center;margin-bottom:24px;}
.tb-group{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.tb-sorts{gap:7px;}
.tb-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--muted-2);text-transform:uppercase;}
.select{background:var(--panel-2);border:1px solid var(--border-2);color:var(--ink);border-radius:8px;
  padding:8px 12px;font-size:13px;font-weight:600;outline:none;}
.select:focus{border-color:var(--lime);}
.chip{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);
  padding:7px 14px;border-radius:99px;font-size:12.5px;font-weight:600;transition:.15s;}
.chip:hover{color:var(--ink);border-color:var(--border-2);}
.chip-on{background:var(--lime);color:var(--lime-ink);border-color:var(--lime);}
.chip-metric{background:rgba(200,242,58,.08);border-color:rgba(200,242,58,.3);color:var(--lime);}
.chip-metric-on{background:var(--lime);color:var(--lime-ink);}

/* ---------- TEAM CARDS ---------- */
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
@media(max-width:980px){.card-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:620px){.card-grid{grid-template-columns:1fr}}
.team-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:20px;
  position:relative;overflow:hidden;transition:.18s;}
.team-card:hover{border-color:var(--border-2);transform:translateY(-2px);}
.tc-accent{position:absolute;left:0;bottom:0;height:3px;width:100%;opacity:.85;}
.tc-top{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.tc-rank{font-family:'Anton',sans-serif;font-size:20px;color:var(--muted-2);}
.tc-id{min-width:0;flex:1;}
.tc-name{font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tc-city{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted-2);margin-top:1px;}
.tc-points{text-align:right;}
.tc-pts-val{font-family:'Anton',sans-serif;font-size:30px;line-height:1;}
.tc-pts-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.1em;}
.tc-metric{background:rgba(200,242,58,.07);border:1px solid rgba(200,242,58,.18);border-radius:10px;
  padding:9px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.tcm-name{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.08em;color:var(--lime);}
.tcm-formula{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:3px;
  max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tcm-score{font-family:'Anton',sans-serif;font-size:24px;color:var(--lime);}
.wdl{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;text-align:center;margin-bottom:14px;}
.wdl div b{font-family:'Anton',sans-serif;font-size:18px;display:block;}
.wdl div span{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted-2);letter-spacing:.08em;}
.wdl-w b{color:var(--w);} .wdl-d b{color:var(--d);} .wdl-l b{color:var(--l);}
.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:16px;}
.mini{background:rgba(255,255,255,.035);border-radius:8px;padding:8px 10px;}
.mini span{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.06em;color:var(--muted-2);display:block;}
.mini b{font-size:13.5px;font-weight:700;margin-top:2px;display:block;}
.pos{color:var(--w);} .neg{color:var(--l);}
.tc-form{display:flex;align-items:center;justify-content:space-between;}
.tc-form-lbl{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.1em;color:var(--muted-2);}

/* ---------- PREDICTIONS ---------- */
.btn-primary{background:var(--lime);color:var(--lime-ink);font-family:'JetBrains Mono',monospace;
  font-size:12px;font-weight:700;letter-spacing:.06em;padding:12px 18px;border-radius:9px;transition:.15s;}
.btn-primary:hover{filter:brightness(1.08);}
.btn-primary.block{width:100%;margin-top:18px;padding:14px;}
.pred-list{display:flex;flex-direction:column;gap:16px;}
.pred-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:22px;}
.pred-top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px;margin-bottom:18px;}
.pred-team{display:flex;align-items:center;gap:11px;font-weight:700;font-size:15px;min-width:0;}
.pred-team span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pred-team-r{justify-content:flex-end;}
.pred-mid{text-align:center;}
.pred-score{font-family:'Anton',sans-serif;font-size:34px;line-height:1;display:flex;align-items:center;gap:9px;}
.pred-score span{color:var(--muted-2);font-size:20px;}
.pred-score-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.12em;margin-top:3px;}
.prob-track{display:flex;height:11px;border-radius:99px;overflow:hidden;gap:2px;background:var(--bg);}
.prob-seg{transition:width .5s;}
.prob-h{background:var(--lime);} .prob-d{background:var(--muted-2);} .prob-a{background:#5aa9f0;}
.prob-legend{display:flex;justify-content:space-between;margin-top:9px;font-family:'JetBrains Mono',monospace;
  font-size:11px;color:var(--muted);}
.pl-h{color:var(--lime);font-weight:700;} .pl-a{color:#7cb8f2;font-weight:700;}
.pred-foot{display:flex;align-items:center;gap:16px;margin-top:16px;}
.pred-note{flex:1;font-size:12.5px;color:var(--muted);line-height:1.5;margin:0;text-wrap:pretty;}
.conf-badge{font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;letter-spacing:.05em;
  border:1px solid;padding:5px 11px;border-radius:99px;white-space:nowrap;}

/* ---------- METRICS ---------- */
.metrics-grid{align-items:start;}
.builder .field-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;
  color:var(--muted-2);text-transform:uppercase;display:block;margin:16px 0 7px;}
.input{width:100%;background:var(--panel-2);border:1px solid var(--border-2);color:var(--ink);
  border-radius:9px;padding:11px 13px;font-size:14px;outline:none;}
.input:focus{border-color:var(--lime);}
.formula-input{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--lime);resize:vertical;line-height:1.5;}
.preview-row{display:flex;align-items:center;justify-content:space-between;margin-top:12px;
  background:rgba(200,242,58,.06);border:1px solid rgba(200,242,58,.16);border-radius:9px;padding:10px 13px;}
.preview-val{font-family:'Anton',sans-serif;font-size:22px;}
.var-chips{display:flex;flex-wrap:wrap;gap:6px;}
.var-chip{font-family:'JetBrains Mono',monospace;font-size:11px;background:rgba(255,255,255,.04);
  border:1px solid var(--border);color:var(--muted);padding:6px 10px;border-radius:7px;transition:.12s;}
.var-chip:hover{color:var(--lime);border-color:rgba(200,242,58,.35);}
.op-row{display:flex;gap:6px;margin-top:8px;}
.op-chip{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;width:38px;height:38px;
  background:var(--panel-2);border:1px solid var(--border);border-radius:8px;color:var(--ink);transition:.12s;}
.op-chip:hover{border-color:var(--lime);color:var(--lime);}
.saved-list{display:flex;flex-direction:column;gap:12px;}
.saved-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px 18px;}
.saved-head{display:flex;align-items:center;justify-content:space-between;}
.saved-id{display:flex;align-items:center;gap:9px;}
.saved-name{font-weight:800;font-size:14.5px;}
.scope-tag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;
  background:rgba(200,242,58,.14);color:var(--lime);padding:2px 7px;border-radius:5px;}
.mini-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.06em;
  background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);padding:6px 11px;border-radius:7px;transition:.15s;}
.mini-btn:hover{color:var(--ink);}
.mini-btn-on{background:var(--lime);color:var(--lime-ink);border-color:var(--lime);}
.saved-formula{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--lime);margin-top:9px;}
.saved-desc{font-size:12px;color:var(--muted);margin:6px 0 0;line-height:1.5;}
.results-table{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:2px;}
.rt-row{display:grid;grid-template-columns:20px 22px 1fr auto auto;align-items:center;gap:10px;padding:5px 0;}
.rt-rank{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted-2);}
.rt-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rt-mp{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted-2);}
.rt-score{font-family:'Anton',sans-serif;font-size:16px;}

/* ---------- STANDINGS TABLE ---------- */
.table-panel{padding:8px 8px 18px;overflow-x:auto;}
.table-head,.table-row{display:grid;
  grid-template-columns:42px minmax(150px,1.4fr) repeat(7,40px) 130px 56px;align-items:center;gap:4px;
  padding:0 14px;min-width:720px;}
.table-head{height:42px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;
  color:var(--muted-2);text-transform:uppercase;border-bottom:1px solid var(--border);text-align:center;}
.th-rank{text-align:left;} .th-club{text-align:left;} .th-pts{text-align:right;} .th-form{text-align:left;}
.table-row{height:52px;border-bottom:1px solid var(--border);text-align:center;font-size:13.5px;font-weight:600;
  transition:.12s;}
.table-row:hover{background:rgba(255,255,255,.02);}
.table-row:last-of-type{border-bottom:none;}
.table-row-top{background:rgba(200,242,58,.04);}
.tr-rank{font-family:'JetBrains Mono',monospace;font-weight:700;text-align:left;position:relative;padding-left:8px;}
.tr-rank::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:2px;background:transparent;}
.zone-ucl::before{background:var(--lime);}
.zone-uel::before{background:#5aa9f0;}
.zone-rel::before{background:var(--l);}
.tr-club{display:flex;align-items:center;gap:10px;text-align:left;}
.tr-club b{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.num-w{color:var(--w);} .num-l{color:var(--l);}
.tr-form{display:flex;justify-content:flex-start;}
.tr-pts{font-family:'Anton',sans-serif;font-size:19px;text-align:right;}
.table-legend{display:flex;gap:20px;padding:16px 16px 4px;font-family:'JetBrains Mono',monospace;
  font-size:10px;color:var(--muted);}
.table-legend span{display:flex;align-items:center;gap:7px;}
.lg{width:9px;height:9px;border-radius:2px;display:inline-block;}
.lg-ucl{background:var(--lime);} .lg-uel{background:#5aa9f0;} .lg-rel{background:var(--l);}

#root-app{min-height:100vh;}
</style>
</head>
<body>
<div id="root-app"></div>

<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<rect width="100" height="100" fill="#0b0c08"/>
<text x="50" y="58" font-family="Arial" font-weight="900" font-size="44" fill="#c8f23a" text-anchor="middle">S</text>
</svg>
</template>
